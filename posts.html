<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Posts | Nguyen Ngoc Vien</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        background:
          radial-gradient(circle at top, rgba(59, 130, 246, 0.18), transparent 28%),
          radial-gradient(circle at right, rgba(14, 165, 233, 0.1), transparent 26%),
          linear-gradient(180deg, #050816 0%, #0b1020 100%);
      }

      .glass {
        background: rgba(10, 15, 28, 0.82);
        border: 1px solid rgba(148, 163, 184, 0.14);
        backdrop-filter: blur(16px);
      }
    </style>
  </head>
  <body class="min-h-screen text-slate-100">
    <header class="sticky top-0 z-50 border-b border-slate-800/70 glass">
      <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
          <div class="flex items-center gap-3">
            <img
              src="https://scontent.fsgn1-1.fna.fbcdn.net/v/t39.30808-6/458380324_2403119369897476_746221273451325288_n.jpg?_nc_cat=103&ccb=1-7&_nc_sid=6ee11a&_nc_eui2=AeGsjSCNVq8DG4Oc9Fhb6gx_zIKlOkal8S_MgqU6RqXxL922TApX9H8PV9SgYLRCYurl4cw-mlADlg3AefIQiJRQ&_nc_ohc=9aMhqZKuvbQQ7kNvwFLwt8u&_nc_oc=AdlnLRXwQXC4Ytw6kI3EXNnm_4-Hlx97GuLlyqqm7aEXxvV9fDDU7RKTvCqtNgvMADs&_nc_zt=23&_nc_ht=scontent.fsgn1-1.fna&_nc_gid=QJ4fXvxoKnHualb5A3-94A&oh=00_AfJ0Vgzon_zFuJ0NSxmkQW_s-man-m6WMCd-EPleDJ6wJg&oe=682398BF"
              alt="Avatar"
              class="w-10 h-10 rounded-full shadow-lg ring-1 ring-slate-700"
            />
            <div>
              <p class="font-semibold text-slate-100 leading-tight">Nguyen Ngoc Vien</p>
              <p class="text-xs text-slate-400">Backend Developer Blog</p>
            </div>
          </div>

          <nav class="hidden md:flex space-x-6 text-sm">
            <a href="index.html" class="text-slate-300 hover:text-cyan-300 transition">Home</a>
            <a href="#post-list" class="text-slate-300 hover:text-cyan-300 transition">Posts</a>
          </nav>
        </div>
      </div>
    </header>

    <main id="post-list" class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
      <div class="mb-10">
        <p class="text-cyan-300 uppercase tracking-[0.25em] text-xs font-semibold">Blog</p>
        <h1 class="mt-3 text-4xl sm:text-5xl font-black text-slate-50">
          Articles for engineers who ship systems
        </h1>
        <p class="mt-4 max-w-3xl text-slate-400 text-lg">
          A curated list of technical notes, workflow guides, and practical implementation details.
        </p>
      </div>

      <div id="posts-grid" class="grid gap-6 md:grid-cols-2 xl:grid-cols-3"></div>
    </main>

    <script>
      const fallbackPosts = [
        {
          title: "How to Change SMTP Password in Postfix",
          description:
            "A practical guide for updating the SMTP password used by Postfix.",
          url: "posts/how-to-change-password-smtp-postfix.html",
          accent: "SMTP / Postfix",
        },
        {
          title: "Setting Up Trust Between WebSphere Servers with Retrieve from Port",
          description:
            "Import a certificate from a remote SSL port into a WebSphere TrustStore.",
          url: "posts/setup-trust-server-by-retreive-from-port/index.html",
          accent: "WebSphere / SSL",
        },
        {
          title: "CI/CD with Docker Hub and ArgoCD",
          description:
            "A guide to building a GitOps-based CI/CD pipeline with Docker Hub and ArgoCD.",
          url: "posts/ci-cd-dockerhub-argocd-blog.html",
          accent: "DevOps / GitOps",
        },
        {
          title: "Launching a Frontend Project from Scratch",
          description:
            "A technical note on planning, scaffolding, and shipping a modern frontend project from the ground up.",
          url: "posts/frontend-project-from-scratch.html",
          accent: "Frontend / Architecture",
        },
      ];

      const grid = document.getElementById("posts-grid");

      function renderPosts(posts) {
        grid.innerHTML = posts
          .map(
            (post, index) => `
              <article class="glass rounded-2xl overflow-hidden shadow-2xl hover:-translate-y-1 hover:shadow-cyan-950/40 transition duration-300">
                <div class="p-6">
                  <div class="flex items-center justify-between gap-4 mb-4">
                    <span class="text-xs uppercase tracking-[0.25em] text-cyan-300">Article ${String(index + 1).padStart(2, "0")}</span>
                    <span class="text-xs text-slate-500">Technical note</span>
                  </div>
                  <h2 class="text-2xl font-bold text-slate-50 leading-tight mb-3">
                    ${post.title}
                  </h2>
                  <p class="text-slate-400 leading-7 mb-6">
                    ${post.description}
                  </p>
                  <div class="flex items-center justify-between gap-4">
                    <a
                      href="post_detail.html?id=${index + 1}"
                      class="inline-flex items-center rounded-full bg-cyan-500/10 px-4 py-2 text-cyan-300 ring-1 ring-cyan-400/30 hover:bg-cyan-500/20 hover:text-cyan-200 transition"
                    >
                      View details
                    </a>
                    <a
                      href="${post.url}"
                      class="text-sm text-slate-400 hover:text-cyan-300 transition"
                    >
                      Open article
                    </a>
                  </div>
                </div>
              </article>
            `
          )
          .join("");
      }

      fetch("posts.json")
        .then((res) => {
          if (!res.ok) {
            throw new Error(`posts.json returned ${res.status}`);
          }
          return res.json();
        })
        .then(renderPosts)
        .catch((error) => {
          console.warn("Falling back to embedded posts list:", error);
          renderPosts(fallbackPosts);
        });
    </script>
  </body>
</html>
