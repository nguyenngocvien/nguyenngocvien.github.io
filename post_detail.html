<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Post Detail | Nguyen Ngoc Vien</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        background:
          radial-gradient(circle at top, rgba(59, 130, 246, 0.18), transparent 28%),
          radial-gradient(circle at right, rgba(14, 165, 233, 0.1), transparent 26%),
          linear-gradient(180deg, #050816 0%, #0b1020 100%);
      }

      .glass {
        background: rgba(10, 15, 28, 0.82);
        border: 1px solid rgba(148, 163, 184, 0.14);
        backdrop-filter: blur(16px);
      }
    </style>
  </head>
  <body class="min-h-screen text-slate-100">
    <header class="sticky top-0 z-50 border-b border-slate-800/70 glass">
      <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
          <div class="flex items-center gap-3">
            <img
              src="https://scontent.fsgn1-1.fna.fbcdn.net/v/t39.30808-6/458380324_2403119369897476_746221273451325288_n.jpg?_nc_cat=103&ccb=1-7&_nc_sid=6ee11a&_nc_eui2=AeGsjSCNVq8DG4Oc9Fhb6gx_zIKlOkal8S_MgqU6RqXxL922TApX9H8PV9SgYLRCYurl4cw-mlADlg3AefIQiJRQ&_nc_ohc=9aMhqZKuvbQQ7kNvwFLwt8u&_nc_oc=AdlnLRXwQXC4Ytw6kI3EXNnm_4-Hlx97GuLlyqqm7aEXxvV9fDDU7RKTvCqtNgvMADs&_nc_zt=23&_nc_ht=scontent.fsgn1-1.fna&_nc_gid=QJ4fXvxoKnHualb5A3-94A&oh=00_AfJ0Vgzon_zFuJ0NSxmkQW_s-man-m6WMCd-EPleDJ6wJg&oe=682398BF"
              alt="Avatar"
              class="w-10 h-10 rounded-full shadow-lg ring-1 ring-slate-700"
            />
            <div>
              <p class="font-semibold text-slate-100 leading-tight">Nguyen Ngoc Vien</p>
              <p class="text-xs text-slate-400">Backend Developer Blog</p>
            </div>
          </div>

          <nav class="hidden md:flex space-x-6 text-sm">
            <a href="index.html" class="text-slate-300 hover:text-cyan-300 transition">Home</a>
            <a href="posts.html" class="text-slate-300 hover:text-cyan-300 transition">Posts</a>
          </nav>
        </div>
      </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
      <div id="post-shell" class="glass rounded-3xl overflow-hidden shadow-2xl">
        <div class="p-6 sm:p-10">
          <p class="text-cyan-300 uppercase tracking-[0.25em] text-xs font-semibold">Article detail</p>
          <h1 id="post-title" class="mt-3 text-3xl sm:text-5xl font-black text-slate-50 leading-tight">
            Loading post...
          </h1>
          <p id="post-description" class="mt-4 text-slate-400 text-lg leading-8"></p>

          <div class="mt-8 flex flex-wrap gap-3">
            <a
              id="post-open"
              href="#"
              class="inline-flex items-center rounded-full bg-cyan-500 px-5 py-3 font-semibold text-slate-950 hover:bg-cyan-400 transition"
            >
              Open source article
            </a>
            <a
              href="posts.html"
              class="inline-flex items-center rounded-full bg-slate-800 px-5 py-3 font-semibold text-slate-100 ring-1 ring-slate-700 hover:bg-slate-700 transition"
            >
              Back to posts
            </a>
          </div>
        </div>

        <div class="px-6 sm:px-10 pb-10">
          <div class="rounded-2xl border border-slate-800 bg-slate-950/60 p-6 text-slate-300 leading-8">
            <p class="font-semibold text-slate-100 mb-2">Reading note</p>
            <p>
              This detail page is a clean shell for the selected article. The full content lives in the dedicated post page.
              Use the button above to open the source article.
            </p>
          </div>
        </div>
      </div>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const id = Number(params.get("id") || "1");

      const fallbackPosts = [
        {
          title: "How to Change SMTP Password in Postfix",
          description:
            "A practical guide for updating the SMTP password used by Postfix.",
          url: "posts/how-to-change-password-smtp-postfix.html",
        },
        {
          title: "Setting Up Trust Between WebSphere Servers with Retrieve from Port",
          description:
            "Import a certificate from a remote SSL port into a WebSphere TrustStore.",
          url: "posts/setup-trust-server-by-retreive-from-port/index.html",
        },
        {
          title: "CI/CD with Docker Hub and ArgoCD",
          description:
            "A guide to building a GitOps-based CI/CD pipeline with Docker Hub and ArgoCD.",
          url: "posts/ci-cd-dockerhub-argocd-blog.html",
        },
      ];

      function applyPost(post) {
        document.title = `${post.title} | Nguyen Ngoc Vien`;
        document.getElementById("post-title").textContent = post.title;
        document.getElementById("post-description").textContent = post.description;
        document.getElementById("post-open").href = post.url;
      }

      fetch("posts.json")
        .then((res) => {
          if (!res.ok) {
            throw new Error(`posts.json returned ${res.status}`);
          }
          return res.json();
        })
        .then((posts) => {
          const post = posts[id - 1] || posts[0];
          applyPost(post);
        })
        .catch((error) => {
          console.warn("Falling back to embedded post metadata:", error);
          const post = fallbackPosts[id - 1] || fallbackPosts[0];
          applyPost(post);
        });
    </script>
  </body>
</html>
